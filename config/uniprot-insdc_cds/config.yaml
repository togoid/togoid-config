update:
  frequency: Monthly
  method: gzip -dc ${TOGOID_ROOT}/input/uniprot/idmapping.dat.gz | awk -F '\t' '$2=="EMBL-CDS" && $1!="-" && $3!="-" {u=gensub(/\.[0-9]+$/, "", "g", $1); r=gensub(/\.[0-9]+$/, "", "g", $3); if(!a[u,r]++) {print u "\t" r}}'
